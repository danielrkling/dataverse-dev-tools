<!doctype html>
<html lang="en" data-theme="business">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web IDE</title>
    <style>
      html,
      body {
        padding: 0;
        margin: 0;
      }

      web-terminal {
        height: 100vh;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "@optique/core": "https://esm.sh/@optique/core@1.1.1",
          "isomorphic-git": "https://esm.sh/isomorphic-git@1.27.1",
          "tailwindcss": "https://esm.sh/tailwindcss@4.1.6"
        }
      }
    </script>
    <script type="module">
      window.addEventListener("keydown", async (e) => {
        if (e.ctrlKey && e.key === "`") {
          await import("//cdn.jsdelivr.net/npm/eruda");
          eruda.init();
        }
      });
    </script>
    <script src="src/main.mjs" defer type="module"></script>
  </head>
  <body>
    <web-terminal></web-terminal>
  </body>
</html>
